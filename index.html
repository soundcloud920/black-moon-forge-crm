<!doctype html>
<html lang="ru">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Black Moon Forge Studio CRM</title>
    <link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 64 64'%3E%3Crect width='64' height='64' rx='6' fill='%23070606'/%3E%3Cpath d='M15 47h34M20 39l12-24 12 24M25 31h14' stroke='%23a97142' stroke-width='5' stroke-linecap='round' stroke-linejoin='round'/%3E%3Cpath d='M48 14l-8 8 8 8' stroke='%23b71f22' stroke-width='4' stroke-linecap='round'/%3E%3C/svg%3E" />
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <section id="unlockScreen" class="login-screen">
      <div class="login-runes" aria-hidden="true">
        <span>ᛒ</span>
        <span>ᛗ</span>
        <span>ᚠ</span>
      </div>

      <form id="unlockForm" class="login-panel">
        <div class="brand brand-login">
          <div class="brand-mark" aria-hidden="true"><span></span></div>
          <div>
            <p class="brand-kicker">Black Moon Forge Studio</p>
            <h1>Forge CRM</h1>
          </div>
        </div>

        <div class="login-copy">
          <p class="eyebrow">Закрытый вход</p>
          <h2>Общак, подрядчики и платежи</h2>
        </div>

        <label>
          Логин
          <input name="login" type="text" autocomplete="username" required />
        </label>
        <label>
          Пароль
          <input name="password" type="password" autocomplete="current-password" required />
        </label>

        <label class="remember-row">
          <input name="remember" type="checkbox" checked />
          <span>Запомнить это устройство</span>
        </label>

        <p id="unlockError" class="login-error" role="alert" aria-live="polite"></p>
        <button class="primary-button" type="submit">Войти</button>
      </form>
    </section>

    <script src="secure-payload.js"></script>
    <script src="auth.js"></script>
  </body>
</html>
