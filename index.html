<!doctype html>
<html lang="ru">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Black Moon Forge Studio CRM</title>
    <link rel="icon" href="assets/brand/black-forge-moon-logo.png" />
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <main id="unlockScreen" class="login-screen">
      <form id="unlockForm" class="login-panel">
        <div class="brand brand-login">
          <img class="brand-logo" src="assets/brand/black-forge-moon-logo.png" alt="Black Forge Moon Studio" />
          <div>
            <p class="brand-kicker">Black Moon Forge Studio</p>
            <h1>Forge CRM</h1>
          </div>
        </div>

        <div class="login-copy">
          <p class="eyebrow">Закрытый вход</p>
          <h2>Войти</h2>
        </div>

        <label>
          Логин
          <input name="login" type="text" autocomplete="username" required />
        </label>
        <label>
          Пароль
          <input name="password" type="password" autocomplete="current-password" required />
        </label>

        <label class="remember-row">
          <input name="remember" type="checkbox" checked />
          <span>Запомнить это устройство</span>
        </label>

        <p id="unlockError" class="login-error" role="alert" aria-live="polite"></p>
        <button class="primary-button" type="submit">Войти</button>
      </form>
    </main>

    <script src="sync-config.js"></script>
    <script src="secure-payload.js"></script>
    <script src="auth.js"></script>
  </body>
</html>
